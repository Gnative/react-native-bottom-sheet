pre-commit:
  jobs:
    - name: ktfmt
      run: ktfmt --google-style {staged_files}
      glob: 'android/**/*.kt'
      stage_fixed: true
    - name: swiftformat
      run: swiftformat {staged_files}
      glob: 'ios/**/*.swift'
      stage_fixed: true
    - name: eslint
      run: bun eslint --fix {staged_files}
      glob: '*.{js,ts,tsx}'
      stage_fixed: true
    - name: prettier
      run: bun prettier --write {staged_files}
      glob: '*.md'
      stage_fixed: true
